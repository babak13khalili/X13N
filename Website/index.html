<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>X13N</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="alternate" type="application/rss+xml" title="X13N RSS Feed" href="feed.xml" />
    <link rel="alternate" type="application/feed+json" title="X13N JSON Feed" href="feed.json" />
  </head>
  <body>
    <main class="layout">
      <header class="header">
        <h1 class="brand">X13N</h1>
        <p class="brand-note">/zɛn/</p>
      </header>

      <section class="post-list" id="post-list" aria-label="Posts"></section>

      <footer class="footer" aria-label="Footer">
        <form
          class="subscribe-form"
          action="https://buttondown.com/api/emails/embed-subscribe/x13nzen"
          method="post"
          target="buttondown-subscribe-frame">
          <label class="subscribe-label" for="subscribe-email">Subscribe</label>
          <input
            class="subscribe-input"
            id="subscribe-email"
            type="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required />
          <input type="hidden" name="embed" value="1" />
          <button class="subscribe-button" type="submit">Submit</button>
        </form>
        <iframe
          class="subscribe-frame"
          name="buttondown-subscribe-frame"
          title="Buttondown subscription response"
          hidden></iframe>
        <p class="contact-text">
          Contact:
          <a class="contact-link" href="mailto:X13N.ZEN@gmail.com">X13N.ZEN@gmail.com</a>
        </p>
      </footer>
    </main>

    <script src="js/posts.js"></script>
    <script src="js/site.js"></script>
  </body>
</html>
